<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Tintorería Gaytan - Dashboard Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .big-input { font-size: 1.25rem; padding: 16px; }
        .machine-btn {
            font-size: 1.1rem;
            padding: 20px 12px;
            min-height: 80px;
        }
        .btn-save {
            font-size: 1.3rem;
            padding: 20px;
        }
        .history-item {
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-5xl mx-auto p-4">

    <!-- Header -->
    <div class="bg-zinc-900 rounded-3xl p-5 mb-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-sky-600 rounded-2xl flex items-center justify-center text-4xl font-bold">G</div>
            <div>
                <h1 class="text-3xl font-bold">TINTORERÍA GAYTAN</h1>
                <p class="text-zinc-400">Captura Digital • Departamento de Tintorería</p>
            </div>
        </div>
        <div class="text-right">
            <p id="today-date" class="text-lg font-medium"></p>
            <div class="flex items-center gap-3 mt-2">
                <span class="text-zinc-400 text-sm">Usuario:</span>
                <span id="current-user" class="font-medium text-emerald-400">Sin usuario</span>
            </div>
        </div>
    </div>

    <!-- Machine Quick Select -->
    <div class="grid grid-cols-4 gap-3 mb-8" id="machine-buttons"></div>

    <!-- Main Form -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
        <h2 class="text-2xl font-semibold mb-6">Nueva Entrada de Producción</h2>
        
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="text-zinc-400 block mb-2">Lote</label>
                <input id="lote" type="text" class="big-input w-full bg-zinc-800 rounded-2xl" placeholder="26-XXXX">
            </div>
            <div>
                <label class="text-zinc-400 block mb-2">Tela</label>
                <input id="tela" type="text" class="big-input w-full bg-zinc-800 rounded-2xl" placeholder="Pique Olmo, Dubay...">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6 mt-6">
            <div>
                <label class="text-zinc-400 block mb-2">Color</label>
                <input id="color" type="text" class="big-input w-full bg-zinc-800 rounded-2xl">
            </div>
            <div>
                <label class="text-zinc-400 block mb-2">Kilos</label>
                <input id="kilos" type="number" step="0.01" class="big-input w-full bg-zinc-800 rounded-2xl">
            </div>
            <div>
                <label class="text-zinc-400 block mb-2">Proceso</label>
                <input id="proceso" type="text" class="big-input w-full bg-zinc-800 rounded-2xl" placeholder="Pol + Algodón / Blanqueo">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 mt-6">
            <div>
                <label class="text-zinc-400 block mb-2">Hora Inicio</label>
                <input id="hora-inicio" type="time" class="big-input w-full bg-zinc-800 rounded-2xl">
            </div>
            <div>
                <label class="text-zinc-400 block mb-2">Hora Fin</label>
                <input id="hora-fin" type="time" class="big-input w-full bg-zinc-800 rounded-2xl">
            </div>
        </div>

        <div class="mt-6">
            <label class="text-zinc-400 block mb-2">Notas / Estado de la Máquina</label>
            <textarea id="notas" rows="3" class="big-input w-full bg-zinc-800 rounded-3xl" placeholder="Bajando con poliéster..."></textarea>
        </div>

        <div class="flex gap-4 mt-10">
            <button onclick="guardarYNuevo()" 
                    class="flex-1 btn-save bg-emerald-600 hover:bg-emerald-700 rounded-3xl font-semibold">
                ✅ GUARDAR Y NUEVO
            </button>
            <button onclick="guardarSolo()" 
                    class="flex-1 btn-save bg-sky-600 hover:bg-sky-700 rounded-3xl font-semibold">
                💾 GUARDAR
            </button>
        </div>
    </div>

    <!-- Today's Records -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
        <h3 class="text-xl font-semibold mb-4">Registros de Hoy</h3>
        <div id="today-list" class="space-y-4"></div>
    </div>

    <!-- History Tab -->
    <div class="bg-zinc-900 rounded-3xl p-6">
        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
            📜 Historial de Cambios
            <span id="history-count" class="text-sm bg-zinc-800 px-3 py-1 rounded-full"></span>
        </h3>
        <div id="history-list" class="space-y-3 max-h-96 overflow-auto"></div>
    </div>

</div>

<script>
    let currentUser = localStorage.getItem("currentUser") || "";
    let records = JSON.parse(localStorage.getItem("gaytanRecords") || "[]");
    let history = JSON.parse(localStorage.getItem("gaytanHistory") || "[]");

    const machines = ["THIES-1","THIES-2","THEN-1","THEN-2","THIES-3","THIES-4","OVERFLOW-2","GASTON-2"];
    let selectedMachine = "";

    // Create machine buttons
    function createMachineButtons() {
        const container = document.getElementById("machine-buttons");
        container.innerHTML = "";
        machines.forEach(m => {
            const btn = document.createElement("button");
            btn.className = "machine-btn bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-3xl font-medium transition active:scale-95";
            btn.textContent = m;
            btn.onclick = () => {
                selectedMachine = m;
                alert(`Máquina seleccionada: ${m}`);
            };
            container.appendChild(btn);
        });
    }

    // Ask for user name only once
    function askForUser() {
        if (currentUser) {
            document.getElementById("current-user").textContent = currentUser;
            return;
        }
        const name = prompt("Por favor ingresa tu nombre (solo una vez por sesión):", "");
        if (name && name.trim() !== "") {
            currentUser = name.trim();
            localStorage.setItem("currentUser", currentUser);
            document.getElementById("current-user").textContent = currentUser;
        }
    }

    // Add to history
    function addToHistory(action, machine, lote) {
        const entry = {
            timestamp: new Date().toLocaleString('es-MX'),
            user: currentUser || "Desconocido",
            action: action,
            machine: machine,
            lote: lote || "-"
        };
        history.unshift(entry); // add to top
        if (history.length > 50) history.pop(); // keep only last 50
        localStorage.setItem("gaytanHistory", JSON.stringify(history));
        renderHistory();
    }

    // Render history
    function renderHistory() {
        const container = document.getElementById("history-list");
        container.innerHTML = "";
        document.getElementById("history-count").textContent = history.length + " cambios";

        history.forEach(item => {
            const div = document.createElement("div");
            div.className = "history-item bg-zinc-800 rounded-2xl p-4 flex justify-between";
            div.innerHTML = `
                <div>
                    <span class="font-medium">${item.machine}</span> - ${item.action}
                    ${item.lote !== "-" ? `(${item.lote})` : ""}
                </div>
                <div class="text-right text-xs text-zinc-400">
                    ${item.user}<br>
                    ${item.timestamp}
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Save record
    function saveRecord(clearForm = true) {
        if (!currentUser) askForUser();

        const record = {
            date: new Date().toISOString().split('T')[0],
            turno: document.getElementById("turno").value,
            machine: selectedMachine || "Sin máquina",
            lote: document.getElementById("lote").value,
            tela: document.getElementById("tela").value,
            color: document.getElementById("color").value,
            kilos: parseFloat(document.getElementById("kilos").value) || 0,
            horaInicio: document.getElementById("hora-inicio").value,
            horaFin: document.getElementById("hora-fin").value,
            proceso: document.getElementById("proceso").value,
            notas: document.getElementById("notas").value,
            user: currentUser
        };

        records.push(record);
        localStorage.setItem("gaytanRecords", JSON.stringify(records));

        addToHistory("Nuevo registro guardado", record.machine, record.lote);

        alert("✅ Registro guardado correctamente");

        renderTodayList();
        renderHistory();

        if (clearForm) {
            document.getElementById("lote").value = "";
            document.getElementById("tela").value = "";
            document.getElementById("color").value = "";
            document.getElementById("kilos").value = "";
            document.getElementById("proceso").value = "";
            document.getElementById("notas").value = "";
            selectedMachine = "";
        }
    }

    function guardarYNuevo() { saveRecord(true); }
    function guardarSolo() { saveRecord(false); }

    // Render today's records
    function renderTodayList() {
        const container = document.getElementById("today-list");
        container.innerHTML = "";
        const today = new Date().toISOString().split('T')[0];
        const todayRecords = records.filter(r => r.date === today);

        if (todayRecords.length === 0) {
            container.innerHTML = `<p class="text-zinc-400 text-center py-8">No hay registros hoy</p>`;
            return;
        }

        todayRecords.forEach(r => {
            const div = document.createElement("div");
            div.className = "bg-zinc-800 rounded-2xl p-5";
            div.innerHTML = `
                <div class="flex justify-between">
                    <div>
                        <span class="font-semibold">${r.machine}</span> • ${r.lote}
                    </div>
                    <div class="text-emerald-400">${r.kilos} kg</div>
                </div>
                <div class="text-sm text-zinc-400 mt-1">${r.tela} • ${r.color}</div>
            `;
            container.appendChild(div);
        });
    }

    // Autosave every 5 minutes
    function startAutosave() {
        setInterval(() => {
            if (records.length > 0) {
                localStorage.setItem("gaytanRecords", JSON.stringify(records));
                localStorage.setItem("gaytanHistory", JSON.stringify(history));
                console.log("Autosave realizado a las " + new Date().toLocaleTimeString());
            }
        }, 5 * 60 * 1000); // 5 minutes
    }

    // Initialize
    function init() {
        document.getElementById("today-date").textContent = new Date().toLocaleDateString('es-MX', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        createMachineButtons();
        renderTodayList();
        renderHistory();
        startAutosave();

        // Ask for user on load
        setTimeout(() => {
            if (!currentUser) askForUser();
        }, 800);
    }

    window.onload = init;
</script>

</body>
</html>
